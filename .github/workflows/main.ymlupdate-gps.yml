name: Update GPS Position

on:
  schedule:
    # 30分ごとに実行（UTC）
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # 手動実行も可能

permissions:
  contents: write

jobs:
  update-gps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch MapShare KML and convert to JSON
        run: python scripts/fetch_gps.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GPS Updater"
          git add data/gps.json
          git diff --staged --quiet || git commit -m "GPS update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push
